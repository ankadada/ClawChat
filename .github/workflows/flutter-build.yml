name: Build ClawChat Apps

on:
  push:
    branches: ['*']
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - 'scripts/build-apk.sh'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - 'scripts/build-apk.sh'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed for PR comments
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12  # v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5c50a6d005aa65  # v2.19.0
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57  # v4.2.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter_app/android/**/*.gradle*', 'flutter_app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub dependencies
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57  # v4.2.0
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Setup signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"
          cat > flutter_app/android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=${{ github.workspace }}/release.jks
          EOF
          sed -i 's/^[[:space:]]*//' flutter_app/android/key.properties

      - name: Fetch PRoot binaries
        run: bash scripts/fetch-proot-binaries.sh

      - name: Verify PRoot binaries
        run: |
          echo "Checking jniLibs contents..."
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for lib in libproot.so libprootloader.so; do
              FILE="flutter_app/android/app/src/main/jniLibs/${abi}/${lib}"
              if [ ! -f "$FILE" ]; then
                echo "ERROR: Missing $FILE"
                exit 1
              fi
              SIZE=$(stat -c%s "$FILE")
              if [ "$SIZE" -lt 1000 ]; then
                echo "WARN: $FILE looks like a placeholder (${SIZE} bytes)"
              else
                echo "OK: $FILE (${SIZE} bytes)"
              fi
            done
          done

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze Dart code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: flutter_app
        run: flutter test
        # Tests may not exist yet; allow this step to fail until tests are added
        continue-on-error: true

      - name: Build fat APK (all ABIs)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Build per-ABI APKs
        working-directory: flutter_app
        run: flutter build apk --release --split-per-abi

      - name: Build AAB (App Bundle)
        working-directory: flutter_app
        run: flutter build appbundle --release

      - name: Rename and collect artifacts
        id: apks
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          mkdir -p artifacts

          # Fat APK
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             "artifacts/ClawChat-v${VERSION}-universal.apk"

          # Per-ABI APKs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="flutter_app/build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "artifacts/ClawChat-v${VERSION}-${abi}.apk"
            fi
          done

          # AAB
          AAB="flutter_app/build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB" ]; then
            cp "$AAB" "artifacts/ClawChat-v${VERSION}.aab"
          fi

          # Summary
          echo "### Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in artifacts/*; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "| \`$(basename $f)\` | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "Built artifacts:"
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.0
        with:
          name: clawchat-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.0
        with:
          name: clawchat-aab
          path: artifacts/*.aab
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const version = '${{ steps.apks.outputs.version }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = [
              `## Build Successful`,
              ``,
              `**Version:** \`v${version}\``,
              ``,
              `### Download APKs`,
              ``,
              `| Architecture | Download |`,
              `|---|---|`,
              `| arm64-v8a (recommended) | [ClawChat-v${version}-arm64-v8a.apk](${runUrl}#artifacts) |`,
              `| armeabi-v7a (32-bit) | [ClawChat-v${version}-armeabi-v7a.apk](${runUrl}#artifacts) |`,
              `| x86_64 (emulator) | [ClawChat-v${version}-x86_64.apk](${runUrl}#artifacts) |`,
              `| Universal (all ABIs) | [ClawChat-v${version}-universal.apk](${runUrl}#artifacts) |`,
              `| App Bundle (Play Store) | [ClawChat-v${version}.aab](${runUrl}#artifacts) |`,
              ``,
              `> Download from [**Actions Artifacts**](${runUrl}#artifacts)`,
              ``,
              `---`,
              `*Built from ${process.env.GITHUB_SHA.substring(0, 7)} by [GitHub Actions](${runUrl})*`,
            ].join('\n');

            // Find existing bot comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Build Successful')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment build failure on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## Build Failed`,
                ``,
                `The build failed for commit ${process.env.GITHUB_SHA.substring(0, 7)}.`,
                ``,
                `[View build logs](${runUrl})`,
              ].join('\n'),
            });

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write  # needed to create releases and tags

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download APK artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.0
        with:
          name: clawchat-apks
          path: artifacts

      - name: Download AAB artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.0
        with:
          name: clawchat-aab
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClawChat v${{ steps.version.outputs.version }}
          body: |
            ## ClawChat Android v${{ steps.version.outputs.version }}

            Standalone Android app — no Termux required.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `ClawChat-v${{ steps.version.outputs.version }}-arm64-v8a.apk` | Most modern Android phones (recommended) |
            | `ClawChat-v${{ steps.version.outputs.version }}-armeabi-v7a.apk` | Older 32-bit ARM devices |
            | `ClawChat-v${{ steps.version.outputs.version }}-x86_64.apk` | Emulators / x86 devices |
            | `ClawChat-v${{ steps.version.outputs.version }}-universal.apk` | All architectures (larger) |
            | `ClawChat-v${{ steps.version.outputs.version }}.aab` | Android App Bundle (Play Store) |

            ### First Run
            1. Install the APK
            2. Follow the setup wizard (downloads ~500MB Alpine Linux rootfs)
            3. Start the gateway from the app

            ### Requirements
            - Android 10+ (API 29)
            - ~500MB free storage for initial setup
            - Internet connection for first-time setup
          files: artifacts/*
          draft: false
          prerelease: false
