plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// pubspec.yaml is the version authority even for direct Gradle invocation.
// Do not accept ignored/stale flutter.versionName or flutter.versionCode values
// from local.properties when someone runs android/gradlew directly.
def pubspecFile = rootProject.file("../pubspec.yaml")
def pubspecVersion = (pubspecFile.getText("UTF-8") =~
    /(?m)^version:\s*([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)\+([0-9]+)\s*$/)
if (!pubspecVersion.find()) {
    throw new GradleException("pubspec.yaml must declare versionName+versionCode")
}
def flutterVersionName = pubspecVersion.group(1)
def flutterVersionCode = pubspecVersion.group(2)

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def hasKeystore = keystoreProperties.containsKey('storeFile') &&
    file(keystoreProperties['storeFile']).exists()
android {
    namespace = "com.anka.clawbot"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.anka.clawbot"
        minSdk = 29
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -Wall -Wextra -Werror"
            }
        }
    }

    if (hasKeystore) {
        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
        release {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    externalNativeBuild {
        cmake {
            path = file("src/main/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }
}

dependencies {
    implementation 'org.apache.commons:commons-compress:1.26.0'
}

flutter {
    source = "../.."
}
