plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// pubspec.yaml is the version authority even for direct Gradle invocation.
// Do not accept ignored/stale flutter.versionName or flutter.versionCode values
// from local.properties when someone runs android/gradlew directly.
def pubspecFile = rootProject.file("../pubspec.yaml")
def pubspecVersion = (pubspecFile.getText("UTF-8") =~
    /(?m)^version:\s*([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)\+([0-9]+)\s*$/)
if (!pubspecVersion.find()) {
    throw new GradleException("pubspec.yaml must declare versionName+versionCode")
}
def flutterVersionName = pubspecVersion.group(1)
def flutterVersionCode = pubspecVersion.group(2)

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def requiredKeystoreProperties = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword']
def missingKeystoreProperties = requiredKeystoreProperties.findAll { name ->
    !keystoreProperties.containsKey(name) ||
        keystoreProperties[name] == null ||
        keystoreProperties[name].toString().trim().isEmpty()
}
def storeFileValue = keystoreProperties.getProperty('storeFile')
def releaseStoreFile = storeFileValue ? rootProject.file(storeFileValue) : null
def hasKeystore = missingKeystoreProperties.isEmpty() &&
    releaseStoreFile != null &&
    releaseStoreFile.isFile()

def releaseSigningProblem = {
    def issues = []
    if (!missingKeystoreProperties.isEmpty()) {
        issues.add("missing key.properties entries: ${missingKeystoreProperties.join(', ')}")
    }
    if (storeFileValue == null || storeFileValue.trim().isEmpty()) {
        issues.add("storeFile is missing")
    } else if (releaseStoreFile == null || !releaseStoreFile.isFile()) {
        issues.add("storeFile does not resolve to an existing file from the Android root project")
    }
    if (issues.isEmpty()) {
        issues.add("unknown release signing configuration error")
    }
    return issues.join("; ")
}
android {
    namespace = "com.anka.clawbot"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.anka.clawbot"
        minSdk = 29
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -Wall -Wextra -Werror"
            }
        }
    }

    if (hasKeystore) {
        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile releaseStoreFile
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
        release {
            if (hasKeystore) {
                signingConfig signingConfigs.release
            }
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    externalNativeBuild {
        cmake {
            path = file("src/main/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }
}

dependencies {
    implementation 'org.apache.commons:commons-compress:1.26.0'
    testImplementation 'junit:junit:4.13.2'
}

flutter {
    source = "../.."
}

def prootVerifier = rootProject.file("../../scripts/verify-proot-packaging.py")
def prootJniDir = file("src/main/jniLibs")
def verifyProotNativePayloads = tasks.register("verifyProotNativePayloads", Exec) {
    group = "verification"
    description = "Fails before Android builds if the fetched PRoot JNI payload is incomplete."
    commandLine(
        "python3",
        prootVerifier,
        "--jni-dir",
        prootJniDir,
        "--artifact-mode",
        "source",
    )
}

def validateOfficialReleaseSigning = tasks.register("validateOfficialReleaseSigning") {
    group = "verification"
    description = "Fails release builds when the official Android signing configuration is absent or invalid."
    doLast {
        if (!hasKeystore) {
            throw new GradleException(
                "Release signing configuration is missing or invalid: " +
                    "${releaseSigningProblem()}. See RELEASE_SIGNING.md."
            )
        }
    }
}

tasks.matching { task ->
    task.name in [
        "preReleaseBuild",
        "assembleRelease",
        "bundleRelease",
        "packageRelease",
        "validateSigningRelease",
    ]
}.configureEach {
    dependsOn(validateOfficialReleaseSigning)
}

tasks.named("preBuild").configure {
    dependsOn(verifyProotNativePayloads)
}
