plugins {
    id 'org.jetbrains.kotlin.jvm' version '1.9.0'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

sourceSets {
    main.kotlin {
        srcDir '../app/src/main/kotlin'
        include '**/VerifiedApkUpdate.kt'
        include '**/ToolApprovalNotificationState.kt'
    }
    test.kotlin {
        srcDir '../app/src/test/kotlin'
        include '**/VerifiedApkUpdateTest.kt'
        include '**/ToolApprovalNotificationStateTest.kt'
    }
}
