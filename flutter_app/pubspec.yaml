name: clawchat
description: ClawChat - AI Agent Chat on Android with embedded Alpine Linux.
publish_to: 'none'
version: 2.8.0+13

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  convert: ^3.1.0     # AccumulatorSink for streaming hash computation
  crypto: ^3.0.3      # SHA256 verification for rootfs downloads
  encrypt: ^5.0.3
  http: ^1.6.0        # Shared transport plus request-local AbortableRequest cancellation
  provider: ^6.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  package_info_plus: ^8.0.0

  url_launcher: ^6.2.0
  uuid: ^4.2.0
  file_picker: ^8.0.0
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.0
  webview_flutter: ^4.10.0
  http_parser: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/resolv.conf
    - assets/ic_launcher.png
    - assets/skills/github/SKILL.md
    - assets/skills/web-search/SKILL.md
    - assets/skills/code-review/SKILL.md
    - assets/skills/translator/SKILL.md
    - assets/skills/file-manager/SKILL.md
    - assets/skills/system-info/SKILL.md
    - assets/skills/gws-calendar/SKILL.md
    - assets/skills/gws-gmail/SKILL.md
    - assets/skills/gws-drive/SKILL.md
  fonts:
    - family: DejaVuSansMono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
